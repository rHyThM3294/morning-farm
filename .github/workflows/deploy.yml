# ╔══════════════════════════════════════════════════════════════╗
# ║          Morning Farm — GitHub Actions CI/CD                 ║
# ║  觸發：push 到 main 分支時自動建置並部署到 GitHub Pages       ║
# ╚══════════════════════════════════════════════════════════════╝

name: 🌱 Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main          # 推送到 main 時自動觸發
  workflow_dispatch:  # 也可以在 GitHub 網頁手動觸發

# 讓 Actions 有寫入 GitHub Pages 的權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時只允許一個部署在執行，避免並發衝突
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────
  # Job 1：建置
  # ────────────────────────────────────────────────────────────
  build:
    name: 📦 Build
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取程式碼
      - name: ⬇️ Checkout 程式碼
        uses: actions/checkout@v4

      # 2. 設定 Node.js 版本
      - name: 🟢 設定 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm           # 快取 node_modules，加速後續執行

      # 3. 安裝相依套件
      - name: 📥 安裝套件 (npm ci)
        run: npm ci
        # npm ci 比 npm install 更嚴謹：
        # 嚴格依照 package-lock.json，確保每次環境一致

      # 4. 建置
      - name: 🔨 建置專案 (vite build)
        run: npm run build
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      # 5. 將 dist/ 上傳為 Pages artifact，供下一個 job 使用
      - name: ⬆️ 上傳 Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist           # Vite 預設輸出目錄

  # ────────────────────────────────────────────────────────────
  # Job 2：部署（只在 build 成功後才執行）
  # ────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to GitHub Pages
    needs: build               # 等 build job 完成
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}   # 部署完成後顯示網址

    steps:
      - name: 🌐 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
