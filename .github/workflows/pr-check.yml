# ╔══════════════════════════════════════════════════════════════╗
# ║          Morning Farm — PR 品質檢查                          ║
# ║  觸發：有人開 Pull Request 到 main 時，先跑建置確認沒壞掉    ║
# ╚══════════════════════════════════════════════════════════════╝

name: 🔍 PR Check

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    name: ✅ 建置檢查
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout 程式碼
        uses: actions/checkout@v4

      - name: 🟢 設定 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📥 安裝套件
        run: npm ci

      - name: 🔍 型別檢查
        run: npm run typecheck

      - name: 🔨 試建置（確認 PR 不會讓 build 壞掉）
        run: npm run build
        env:
          NODE_ENV: production
